name: Scrape Syngenta TR Products

on:
  # Her gün 06:00 UTC (Türkiye saati 09:00) çalışır
  schedule:
    - cron: '0 6 * * *'
  
  # Manuel tetikleme
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scripts/scraper.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/products.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/products.json
          git commit -m "chore: update product data from syngenta.com.tr [$(date -u +%Y-%m-%d)]"
          git push
